<style>
.error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(165deg,#0d4f3d 0%,#0a3d2e 100%);color:#fff;text-align:center;padding:40px 5%}
.error-inner{max-width:560px}
.error-code{font-size:clamp(6em,15vw,10em);font-weight:900;line-height:1;letter-spacing:-4px;opacity:.15;margin-bottom:-20px}
.error-title{font-size:clamp(1.6em,4vw,2.4em);font-weight:800;margin-bottom:16px}
.error-title em{font-family:'Playfair Display',serif;font-style:italic;color:#f9ad4d}
.error-desc{color:rgba(255,255,255,.6);font-size:1em;line-height:1.7;margin-bottom:32px}
.error-links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.error-btn{padding:14px 32px;border-radius:50px;font-weight:700;font-size:.9em;text-decoration:none;transition:all .3s}
.error-btn-primary{background:#f9ad4d;color:#0a0a0a;box-shadow:0 4px 20px rgba(249,173,77,.3)}
.error-btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(249,173,77,.5)}
.error-btn-outline{border:2px solid rgba(255,255,255,.3);color:#fff}
.error-btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.1)}
.error-suggestions{margin-top:48px;padding-top:32px;border-top:1px solid rgba(255,255,255,.1)}
.error-suggestions h3{font-size:.8em;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:16px}
.error-suggestions a{color:rgba(255,255,255,.7);font-size:.9em;transition:color .3s}
.error-suggestions a:hover{color:#f9ad4d}
</style>
