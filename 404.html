<!DOCTYPE html>

<head>

<style>
.error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(165deg,#0d4f3d 0%,#0a3d2e 100%);color:#fff;text-align:center;padding:40px 5%}
.error-inner{max-width:560px}
.error-code{font-size:clamp(6em,15vw,10em);font-weight:900;line-height:1;letter-spacing:-4px;opacity:.15;margin-bottom:-20px}
.error-title{font-size:clamp(1.6em,4vw,2.4em);font-weight:800;margin-bottom:16px}
.error-title em{font-family:'Playfair Display',serif;font-style:italic;color:#f9ad4d}
.error-desc{color:rgba(255,255,255,.6);font-size:1em;line-height:1.7;margin-bottom:32px}
.error-links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.error-btn{padding:14px 32px;border-radius:50px;font-weight:700;font-size:.9em;text-decoration:none;transition:all .3s}
.error-btn-primary{background:#f9ad4d;color:#0a0a0a;box-shadow:0 4px 20px rgba(249,173,77,.3)}
.error-btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(249,173,77,.5)}
.error-btn-outline{border:2px solid rgba(255,255,255,.3);color:#fff}
.error-btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.1)}
.error-suggestions{margin-top:48px;padding-top:32px;border-top:1px solid rgba(255,255,255,.1)}
.error-suggestions h3{font-size:.8em;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:16px}
.error-suggestions a{color:rgba(255,255,255,.7);font-size:.9em;transition:color .3s}
.error-suggestions a:hover{color:#f9ad4d}
</style>

<style id="ye-nav-fix">
/* Nav mobile harmonisee — identique sur toutes les pages (burger blanc, menu vert, anim vive) */
.nav-logo__img{height:52px;width:auto}
@media(max-width:640px){.nav-logo__img{height:40px}}
.nav-burger span{background:#fff!important}
@media(max-width:900px){
  .nav-burger{display:flex}
  .nav-burger span{transition:transform .3s ease,opacity .2s ease}
  .nav-burger[aria-expanded="true"] span:nth-child(1){transform:translateY(7px) rotate(45deg)}
  .nav-burger[aria-expanded="true"] span:nth-child(2){opacity:0}
  .nav-burger[aria-expanded="true"] span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
  #navLinks.nav-links{position:fixed;inset:0;background:rgba(26,46,26,.98);flex-direction:column;justify-content:center;align-items:center;gap:26px;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .22s ease,visibility .22s ease;display:flex;z-index:998}
  #navLinks.nav-links.open{opacity:1;visibility:visible;pointer-events:auto}
  #navLinks.nav-links a{color:#fff!important;font-size:1.4rem;font-weight:600;opacity:0;transform:translateY(14px);transition:opacity .3s ease,transform .34s cubic-bezier(.16,1,.3,1)}
  #navLinks.nav-links.open a{opacity:1;transform:translateY(0)}
  #navLinks.nav-links.open a:nth-child(1){transition-delay:.03s}
  #navLinks.nav-links.open a:nth-child(2){transition-delay:.06s}
  #navLinks.nav-links.open a:nth-child(3){transition-delay:.09s}
  #navLinks.nav-links.open a:nth-child(4){transition-delay:.12s}
  #navLinks.nav-links.open a:nth-child(5){transition-delay:.15s}
  #navLinks.nav-links.open a:nth-child(6){transition-delay:.18s}
  #navLinks.nav-links.open a:nth-child(7){transition-delay:.21s}
  #navLinks.nav-links.open a:nth-child(8){transition-delay:.24s}
  #navLinks.nav-links.open a:nth-child(9){transition-delay:.27s}
  #navLinks.nav-links a.btn-cta{background:var(--gold,#f9ad4d);color:#0d4f3d!important;padding:.7rem 1.8rem;border-radius:50px;font-size:1rem}
}
@media(prefers-reduced-motion:reduce){
  .nav-burger span,#navLinks.nav-links,#navLinks.nav-links a{transition:none!important}
  #navLinks.nav-links a{transform:none!important}
}
</style>

<body>
<a href="#main-content" class="sr-only skip-link">Aller au contenu principal</a>
<main id="main-content">
<div class="error-page">
  <div class="error-inner">
    <div class="error-code">404</div>
    <h1 class="error-title">Page <em>introuvable</em></h1>
    <p class="error-desc">Cette page n'existe pas ou a peut-être été déplacée. Pas de panique, votre prochain repas libanais est juste ici.</p>
    <div class="error-links">
      <a href="/" class="error-btn error-btn-primary">Accueil</a>
      <a href="/menu" class="error-btn error-btn-outline">Voir le menu</a>
      <a href="https://commandes.yallaeat.fr/order/" class="error-btn error-btn-outline" target="_blank" rel="noopener noreferrer">Commander</a>
    </div>
    <div class="error-suggestions">
      <h3>Pages populaires</h3>
      <p>
        <a href="/bowl">Bowls</a> · <a href="/shawarma-lyon">Shawarma</a> · <a href="/falafel-lyon">Falafel</a> · <a href="/traiteur">Traiteur</a> · <a href="/contact">Contact</a>
      </p>
    </div>
  </div>
</div>
</main>
<script id="ye-nav-lock">
(function(){
  var nl=document.getElementById("navLinks"); if(!nl) return;
  var y=0, locked=false;
  function lock(){ y=window.pageYOffset||document.documentElement.scrollTop||0; var b=document.body;
    b.style.position="fixed"; b.style.top=(-y)+"px"; b.style.left="0"; b.style.right="0"; b.style.width="100%"; locked=true; }
  function unlock(){ var b=document.body;
    b.style.position=""; b.style.top=""; b.style.left=""; b.style.right=""; b.style.width=""; window.scrollTo(0,y); locked=false; }
  new MutationObserver(function(){
    var open=nl.classList.contains("open");
    if(open&&!locked) lock(); else if(!open&&locked) unlock();
  }).observe(nl,{attributes:true,attributeFilter:["class"]});
})();
</script>
</body>
</html>
